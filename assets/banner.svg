<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="SfMC Agentic Challenge banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="55%" stop-color="#5C2D91"/>
      <stop offset="100%" stop-color="#E3008C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- Flow / circuit motif -->
  <g stroke="#ffffff" stroke-opacity="0.55" fill="none" stroke-width="2" filter="url(#soft)">
    <path d="M-20 230 C 180 230, 220 110, 420 110 S 660 250, 860 250 S 1100 130, 1240 130"/>
    <path d="M-20 80 C 160 80, 220 200, 380 200 S 620 60, 820 60 S 1080 220, 1240 220" stroke-opacity="0.3"/>
  </g>
  <g fill="#ffffff">
    <circle cx="180" cy="230" r="5"/>
    <circle cx="420" cy="110" r="6"/>
    <circle cx="660" cy="250" r="5"/>
    <circle cx="860" cy="250" r="6"/>
    <circle cx="1080" cy="155" r="5"/>
    <circle cx="380" cy="200" r="4" fill-opacity="0.6"/>
    <circle cx="820" cy="60" r="4" fill-opacity="0.6"/>
  </g>

  <!-- Hex node (AI motif) -->
  <g transform="translate(980 70)" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.85">
    <polygon points="0,-34 30,-17 30,17 0,34 -30,17 -30,-17"/>
    <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" stroke-opacity="0.6"/>
    <circle r="4" fill="#ffffff"/>
  </g>

  <!-- Text -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#ffffff">
    <text x="60" y="140" font-size="64" font-weight="700" letter-spacing="0.5">SfMC Agentic Challenge</text>
    <text x="62" y="188" font-size="26" font-weight="400" fill-opacity="0.92">Brainstorm. Build. Share.</text>
    <g transform="translate(62 220)" font-size="18" fill-opacity="0.95">
      <rect x="0" y="0" width="170" height="34" rx="17" fill="#ffffff" fill-opacity="0.15"/>
      <text x="20" y="22">⚡ 15 min brainstorm</text>
      <rect x="184" y="0" width="160" height="34" rx="17" fill="#ffffff" fill-opacity="0.15"/>
      <text x="204" y="22">🛠️ 60 min build</text>
      <rect x="358" y="0" width="160" height="34" rx="17" fill="#ffffff" fill-opacity="0.15"/>
      <text x="378" y="22">🎤 share &amp; learn</text>
    </g>
  </g>
</svg>
